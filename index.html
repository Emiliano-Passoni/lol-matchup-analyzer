/* ===== V11 rune hover descriptions ===== */
.runeMini,
.runeBox {
  position: relative;
}

.runeMini[data-tip],
.runeBox[data-tip] {
  cursor: help;
}

.runeMini[data-tip]:hover::after,
.runeBox[data-tip]:hover::after {
  content: attr(data-tip);
  position: absolute;
  left: 0;
  bottom: calc(100% + 8px);
  z-index: 100;
  width: min(360px, 78vw);
  white-space: normal;
  background: #010a13;
  border: 1px solid #c89b3c;
  color: #f0e6d3;
  padding: 10px 12px;
  border-radius: 10px;
  box-shadow: 0 14px 36px #000;
  font-size: 12px;
  line-height: 1.45;
  text-align: left;
  pointer-events: none;
}

.runeMini[data-tip]:hover::before,
.runeBox[data-tip]:hover::before {
  content: "";
  position: absolute;
  left: 18px;
  bottom: 100%;
  border: 8px solid transparent;
  border-top-color: #c89b3c;
  z-index: 101;
}

function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function icon(n){

  return '';
}
function champPill(n){
  if(!n)return '';
  let src=icon(n);
  return `<span class="pill">${src?`<img class="avatar" src="${src}" alt="${esc(n)}">`:''}<span>${esc(n)}</span></span>`;
}
function champList(title,arr){
  arr=arr.filter(Boolean);
  if(!arr.length)return '';
  return card(title,`<div class="pills">${arr.map(champPill).join('')}</div>`,'blue');
}

  for(let p of parts){ if(ITEMS[p]) return ITEMS[p]; }
  for(let p of parts){
    let k=Object.keys(ITEMS).find(x=>x===p||x.includes(p)||p.includes(x));
    if(k) return ITEMS[k];
  }
  return '';
}

function itemDesc(name){
  let parts=aliases(name);
  for(let p of parts){ if(ITEM_DESC[p]) return ITEM_DESC[p]; }
  for(let p of parts){
    let k=Object.keys(ITEM_DESC).find(x=>x===p||x.includes(p)||p.includes(x));
    if(k) return ITEM_DESC[k];
  }
  return '';
}
function itemTip(name,why){
  let d=cleanTip(itemDesc(name));
  let w=cleanTip(why);
  let out=[d,w].filter(Boolean).join(' | Decisión: ');
  return out ? ` data-tip="${esc(out)}"` : '';
}
function runeIcon(name){
  let parts=aliases(name);
  for(let p of parts){ if(RUNES[p]) return RUNES[p]; if(TREES[p]) return TREES[p]; }
  for(let p of parts){
    let k=Object.keys(RUNES).find(x=>x===p||x.includes(p)||p.includes(x));
    if(k) return RUNES[k];
    let t=Object.keys(TREES).find(x=>x===p||x.includes(p)||p.includes(x));
    if(t) return TREES[t];
  }
  return '';
}

function cleanTip(s){
  return String(s||'')
    .replace(/<br\s*\/?>/gi,' ')
    .replace(/<[^>]+>/g,'')
    .replace(/\s+/g,' ')
    .trim();
}
function runeDesc(name){
  let parts=aliases(name);
  for(let p of parts){ if(RUNE_DESC[p]) return RUNE_DESC[p]; if(TREE_DESC[p]) return TREE_DESC[p]; }
  for(let p of parts){
    let k=Object.keys(RUNE_DESC).find(x=>x===p||x.includes(p)||p.includes(x));
    if(k) return RUNE_DESC[k];
    let t=Object.keys(TREE_DESC).find(x=>x===p||x.includes(p)||p.includes(x));
    if(t) return TREE_DESC[t];
  }
  return '';
}
function tipAttr(s){
  let t=cleanTip(s);
  return t ? ` data-tip="${esc(t)}"` : '';
}
function runeBadge(name){
  let src=runeIcon(name), desc=runeDesc(name);
  return `<span class="runeMini"${tipAttr(desc)}>${src?`<img class="runeIcon" src="${src}" alt="${esc(name)}">`:''}${esc(name)}</span>`;
}

function ov(n){return ROLE_OVERRIDES[n]||ROLE_OVERRIDES[(C[n]&&C[n].id)||'']||null}
function prof(n){let p=profiles[n];if(p&&p.r)return p;let ch=C[n],tags=ch?.tags||[],o=ov(n);let kind=p?.kind||(o&&o[0]);if(!kind){if(role==='Support'&&tags.includes('Support'))kind='tank';else if(tags.includes('Marksman'))kind='marksman';else if(tags.includes('Assassin'))kind='assassin';else if(tags.includes('Fighter'))kind='fighter';else if(tags.includes('Mage'))kind='mage';else if(tags.includes('Tank'))kind='tank';else kind='fighter'}let base=generic[kind]||generic.fighter;return {...base,kind,dmg:p?.dmg||(o&&o[1])||guessDmg(kind,ch)}}
function guessDmg(k,ch){if(!ch)return'Unknown';let a=+ch.info.attack,m=+ch.info.magic;return a>m+2?'AD':m>a+2?'AP':'Mixed'}
function vals(ids){return ids.map(id=>document.getElementById(id).value.trim()).filter(Boolean)}
function dmgCount(arr){let c={AD:0,AP:0,Mixed:0,Hybrid:0,Unknown:0};arr.forEach(x=>c[prof(x).dmg in c?prof(x).dmg:'Unknown']++);return c}

function card(t,b,cls=''){return`<div class="card ${cls}"><b>${t}</b><br>${b}</div>`}
function list(it){return`<div class="order">${it.map((x,i)=>{let src=itemIcon(x[0]);let tip=itemTip(x[0],x[1]);return`<div class="item"${tip}><div class="num">${i+1}</div>${src?`<img class="itemIcon" src="${src}" alt="${esc(x[0])}">`:`<div class="itemIcon"></div>`}<div><b>${esc(x[0])}</b><small>${esc(x[1])}</small></div></div>`}).join('')}</div>`}
function runes(p){
  let r=p.r, key=runeIcon(r.k), tree=runeIcon(r.p), stree=runeIcon(r.s);
  let primaryRows=splitRunes(r.rows).map(runeBadge).join('');
  let secondaryRows=splitRunes(r.sr).map(runeBadge).join('');
  let treeTip=tipAttr(runeDesc(r.p)), keyTip=tipAttr(runeDesc(r.k)), streeTip=tipAttr(runeDesc(r.s));
  return card('Primaria',`<div class="runeBox"${treeTip}>${tree?`<img class="runeIcon" src="${tree}" alt="${esc(r.p)}">`:''}<span class="tag">${esc(r.p)}</span></div><div class="runeBox"${keyTip}>${key?`<img class="runeIcon" src="${key}" alt="${esc(r.k)}">`:''}<b>${esc(r.k)}</b></div>${primaryRows}<br><br><div class="runeBox"${streeTip}>${stree?`<img class="runeIcon" src="${stree}" alt="${esc(r.s)}">`:''}<span class="tag">${esc(r.s)}</span><b>Secundaria</b></div>${secondaryRows}<br><br>${esc(r.why)}`,'vio')
}
function team(me,al){let d=dmgCount([me,...al]),t=typeCount([me,...al]),out=[];let ad=d.AD+d.Mixed*.5+d.Hybrid*.5,ap=d.AP+d.Mixed*.5+d.Hybrid*.5;if(ad>=4)out.push(card('Equipo muy AD','Pueden stackear armadura. Si tu campeón es híbrido, ruta AP/mixta; si no, Lord Dominik/Black Cleaver/Serylda según rol.','warn'));if(ap>=4)out.push(card('Equipo muy AP','Pueden stackear MR. Si sos híbrido, ruta AD/on-hit; si sos AP puro, Void Staff y buscar carries.','warn'));if(t.tank==0)out.push(card('Sin frontline','No facecheckees. En bronce esto pierde partidas. Peleá con visión o esperá que entren ellos.','warn'));if(!out.length)out.push(card('Draft aliado usable','No hay alarma grande. Seguí core del campeón y ajustá por enemigos.','ok'));return out.join('')}
